name: Daily Data Update

on:
  schedule:
    - cron: '0 5 * * 1-5'   # 10:30 IST — catches early index updates
    - cron: '0 14 * * 1-5'  # 14:00 UTC — BDI publishes ~12:00 UTC, buffer included
    - cron: '0 19 * * 1-5'  # 19:00 UTC — second BDI check in case of delays
    - cron: '0 22 * * 1-5'  # 22:00 UTC — after Solactive (~21:29 UTC) & US close (~21:00 UTC)
  workflow_dispatch:          # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run update script
        run: python update_indices.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "Daily data update $(date +'%Y-%m-%d')"
          git push
