name: Ingest Market Reports

on:
  schedule:
    - cron: '0 8,12,16 * * 1-5'
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source: core | extended | breakwave | baltic | breakwave_insights | hellenic | all'
        default: ''
      hellenic_category:
        description: 'Hellenic category: all | dry_charter | tanker_charter | iron_ore | vessel_valuations | demolition | shipbuilding'
        default: 'all'
      year:
        description: 'UTC year or auto'
        default: 'auto'
      start_year:
        description: 'Optional historical start year (overrides year when set)'
        default: ''
      end_year:
        description: 'Optional historical end year (overrides year when set)'
        default: ''
      overwrite:
        description: 'Overwrite existing archived snapshots: true | false'
        default: 'false'
      dry_run:
        description: 'Dry run: true | false'
        default: 'false'

permissions:
  contents: write

concurrency:
  group: report-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml selenium

      - name: Pull latest
        run: git pull origin main --rebase

      - name: Run report scrapers
        shell: bash
        run: |
          SOURCE_INPUT="${{ github.event.inputs.source || '' }}"
          EVENT_SCHEDULE="${{ github.event.schedule || '' }}"
          if [ -z "$SOURCE_INPUT" ]; then
            if [ "$EVENT_SCHEDULE" = "30 9 * * 1-5" ]; then
              SOURCE="extended"
            else
              SOURCE="core"
            fi
          else
            SOURCE="$SOURCE_INPUT"
          fi
          YEAR_INPUT="${{ github.event.inputs.year || 'auto' }}"
          START_YEAR_INPUT="${{ github.event.inputs.start_year || '' }}"
          END_YEAR_INPUT="${{ github.event.inputs.end_year || '' }}"
          YEARS=""
          if [ -n "$START_YEAR_INPUT" ] || [ -n "$END_YEAR_INPUT" ]; then
            START_YEAR="$START_YEAR_INPUT"
            END_YEAR="$END_YEAR_INPUT"
            [ -z "$START_YEAR" ] && START_YEAR="$END_YEAR"
            [ -z "$END_YEAR" ] && END_YEAR="$START_YEAR"
            if ! [[ "$START_YEAR" =~ ^[0-9]{4}$ && "$END_YEAR" =~ ^[0-9]{4}$ ]]; then
              echo "start_year/end_year must be YYYY when provided"
              exit 1
            fi
            if [ "$START_YEAR" -le "$END_YEAR" ]; then
              YEARS="$(seq "$START_YEAR" "$END_YEAR")"
            else
              YEARS="$(seq "$START_YEAR" -1 "$END_YEAR")"
            fi
          else
            YEAR="$YEAR_INPUT"
            if [ -z "$YEAR" ] || [ "$YEAR" = "auto" ]; then
              YEAR="$(date -u +%Y)"
            fi
            YEARS="$YEAR"
          fi
          HELLENIC_CATEGORY="${{ github.event.inputs.hellenic_category || 'all' }}"
          OVERWRITE="${{ github.event.inputs.overwrite || 'false' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          COMMON_FLAGS=""
          [ "$DRY_RUN" = "true" ] && COMMON_FLAGS="$COMMON_FLAGS --dry-run"
          OVERWRITE_FLAG=""
          [ "$OVERWRITE" = "true" ] && OVERWRITE_FLAG="--overwrite"

          run_by_year() {
            local script="$1"
            local extra_args="$2"
            local supports_overwrite="$3"
            for YEAR in $YEARS; do
              FLAGS="--year $YEAR $COMMON_FLAGS $extra_args"
              if [ "$supports_overwrite" = "true" ] && [ -n "$OVERWRITE_FLAG" ]; then
                FLAGS="$FLAGS $OVERWRITE_FLAG"
              fi
              echo "[INGEST] source=$SOURCE year=$YEAR script=$script overwrite=${OVERWRITE:-false} dry_run=${DRY_RUN:-false}"
              python "$script" $FLAGS
            done
          }

          if [ "$SOURCE" = "all" ] || [ "$SOURCE" = "core" ] || [ "$SOURCE" = "breakwave" ]; then
            run_by_year "scripts/breakwave_scraper.py" "" "false"
          fi

          if [ "$SOURCE" = "all" ] || [ "$SOURCE" = "core" ] || [ "$SOURCE" = "baltic" ]; then
            run_by_year "scripts/baltic_scraper.py" "" "true"
          fi

          if [ "$SOURCE" = "all" ] || [ "$SOURCE" = "extended" ] || [ "$SOURCE" = "breakwave_insights" ]; then
            run_by_year "scripts/breakwave_insights_scraper.py" "" "true"
          fi

          if [ "$SOURCE" = "all" ] || [ "$SOURCE" = "extended" ] || [ "$SOURCE" = "hellenic" ]; then
            run_by_year "scripts/hellenic_scraper.py" "--category $HELLENIC_CATEGORY" "true"
          fi

      - name: Guardrail - verify Breakwave scrape freshness
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          SOURCE_INPUT="${{ github.event.inputs.source || '' }}"
          EVENT_SCHEDULE="${{ github.event.schedule || '' }}"
          YEAR_INPUT="${{ github.event.inputs.year || 'auto' }}"
          START_YEAR_INPUT="${{ github.event.inputs.start_year || '' }}"
          END_YEAR_INPUT="${{ github.event.inputs.end_year || '' }}"

          if [ -z "$SOURCE_INPUT" ]; then
            if [ "$EVENT_SCHEDULE" = "30 9 * * 1-5" ]; then
              SOURCE="extended"
            else
              SOURCE="core"
            fi
          else
            SOURCE="$SOURCE_INPUT"
          fi

          if [ "$SOURCE" != "all" ] && [ "$SOURCE" != "core" ] && [ "$SOURCE" != "breakwave" ]; then
            echo "Skipping Breakwave freshness guardrail for source=$SOURCE"
            exit 0
          fi

          if [ -n "$START_YEAR_INPUT" ] || [ -n "$END_YEAR_INPUT" ]; then
            echo "Skipping Breakwave freshness guardrail for custom start/end year range."
            exit 0
          fi

          CURRENT_YEAR="$(date -u +%Y)"
          if [ -n "$YEAR_INPUT" ] && [ "$YEAR_INPUT" != "auto" ] && [ "$YEAR_INPUT" != "$CURRENT_YEAR" ]; then
            echo "Skipping Breakwave freshness guardrail for explicit year=$YEAR_INPUT."
            exit 0
          fi

          python scripts/check_breakwave_freshness.py --check reports_vs_web

      - name: Commit new reports
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          git config user.name "report-bot"
          git config user.email "bot@shipping"
          git add reports/
          if git diff --staged --quiet; then
            echo "No report changes to commit."
            exit 0
          fi

          git commit -m "reports: ingest latest market reports $(date -u +%Y-%m-%d)"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push race on attempt $attempt. Retrying in 10s..."
            sleep 10
          done

          echo "Failed to push after 3 attempts."
          exit 1
