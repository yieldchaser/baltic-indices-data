name: Process Knowledge Base

on:
  push:
    paths:
      - 'reports/**'
  workflow_run:
    workflows:
      - Ingest Market Reports
    types:
      - completed
  workflow_dispatch:
    inputs:
      source:
        description: 'Source: breakwave | baltic | breakwave_insights | hellenic | books | all'
        default: 'all'
      rebuild:
        description: 'Full rebuild: true | false'
        default: 'false'
      batch_total:
        description: 'Batch count (1 = normal run, 2 = half-half)'
        default: '1'
      batch_index:
        description: 'Batch number to run (1..batch_total)'
        default: '1'

permissions:
  contents: write

concurrency:
  group: knowledge-pipeline
  cancel-in-progress: false

jobs:
  process:
    if: >
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install OCR runtime
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install dependencies
        run: pip install -r requirements_knowledge.txt

      - name: Pull latest
        run: git pull origin main --rebase

      - name: Check for new reports (workflow_run only)
        if: github.event_name == 'workflow_run'
        id: check_new_reports
        shell: bash
        run: |
          MANIFEST="knowledge/manifests/documents.jsonl"
          if [ ! -f "$MANIFEST" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
          else
            REPORTS_TS="$(git log -1 --format=%ct -- reports 2>/dev/null || echo 0)"
            MANIFEST_TS="$(git log -1 --format=%ct -- "$MANIFEST" 2>/dev/null || echo 0)"
            if [ "$REPORTS_TS" -gt "$MANIFEST_TS" ]; then
              echo "new=true" >> "$GITHUB_OUTPUT"
            else
              echo "new=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run processor
        if: github.event_name != 'workflow_run' || steps.check_new_reports.outputs.new == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MIN_INTERVAL_SEC: "2.5"
          GEMINI_MAX_RETRIES: "3"
          GEMINI_BACKOFF_BASE_SEC: "2.0"
          GEMINI_MAX_BACKOFF_SEC: "20.0"
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          OLLAMA_MIN_INTERVAL_SEC: "1.5"
          OLLAMA_MAX_RETRIES: "3"
          OLLAMA_BACKOFF_BASE_SEC: "1.5"
          OLLAMA_MAX_BACKOFF_SEC: "15.0"
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          NIM_BASE_URL: ${{ secrets.NIM_BASE_URL }}
          NIM_MODEL: ${{ secrets.NIM_MODEL }}
          NIM_MIN_INTERVAL_SEC: "1.5"
          NIM_MAX_RETRIES: "3"
          NIM_BACKOFF_BASE_SEC: "1.5"
          NIM_MAX_BACKOFF_SEC: "15.0"
          LLM_PROVIDER_ORDER: "ollama,gemini,nim"
          MANIFEST_FLUSH_EVERY: "200"
          LINKED_PDF_PAGE_LIMIT: "16"
          LINKED_PDF_OCR_PAGE_LIMIT: "6"
          LINKED_TEXT_CHAR_LIMIT: "120000"
          LINKED_TABLE_ROW_LIMIT: "500"
          LINKED_TABLE_COL_LIMIT: "36"
          LINKED_IMAGE_OCR_CHAR_LIMIT: "9000"
          MIN_IMAGE_OCR_PIXELS: "90000"
          MAX_LINKED_ASSETS_PER_DOC: "28"
        shell: bash
        run: |
          set -o pipefail
          FLAGS=""
          SRC="${{ github.event.inputs.source || 'all' }}"
          RB="${{ github.event.inputs.rebuild || 'false' }}"
          BT="${{ github.event.inputs.batch_total || '1' }}"
          BI="${{ github.event.inputs.batch_index || '1' }}"
          [ "$SRC" != "all" ] && FLAGS="$FLAGS --source $SRC"
          [ "$RB" = "true" ] && FLAGS="$FLAGS --rebuild"
          FLAGS="$FLAGS --batch-total $BT --batch-index $BI"
          if [ "$BT" != "1" ] && [ "$SRC" = "all" ]; then
            echo "Batch mode requires source != all. Set source to one source and rerun."
            exit 1
          fi
          python scripts/process_knowledge.py $FLAGS 2>&1 | tee knowledge_processor.log

      - name: Validate knowledge artifacts
        if: github.event_name != 'workflow_run' || steps.check_new_reports.outputs.new == 'true'
        shell: bash
        run: |
          set -o pipefail
          SRC="${{ github.event.inputs.source || 'all' }}"
          if [ "$SRC" = "all" ]; then
            python scripts/validate_knowledge.py 2>&1 | tee knowledge_validator.log
          else
            python scripts/validate_knowledge.py --source "$SRC" 2>&1 | tee knowledge_validator.log
          fi

      - name: Prepare failure diagnostics
        if: failure()
        shell: bash
        run: |
          git status --porcelain > knowledge_changed_files.txt || true
          git diff --name-only > knowledge_changed_tracked.txt || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-failure-diagnostics-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            knowledge/manifests/**
            knowledge/reports/**
            knowledge_processor.log
            knowledge_validator.log
            knowledge_changed_files.txt
            knowledge_changed_tracked.txt

      - name: Commit knowledge artifacts
        if: github.event_name != 'workflow_run' || steps.check_new_reports.outputs.new == 'true'
        shell: bash
        run: |
          git config user.name "knowledge-bot"
          git config user.email "bot@shipping"
          git add knowledge/
          if git diff --staged --quiet; then
            echo "No knowledge changes to commit."
            exit 0
          fi

          git commit -m "knowledge: update $(date -u +%Y-%m-%d)"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push race on attempt $attempt. Retrying in 10s..."
            sleep 10
          done

          echo "Failed to push after 3 attempts."
          exit 1
